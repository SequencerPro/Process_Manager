# On-premises deployment configuration for Process Manager.
# Usage:
#   1. Copy .env.example to .env and fill in the required values.
#   2. Run: docker compose up -d
#   3. Open the UI at http://localhost:5000
#
# Note: This file is NOT used by Render.com (which reads render.yaml exclusively).

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: processmanager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — see .env.example}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── API ──────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: src/ProcessManager.Api/Dockerfile
    restart: unless-stopped
    ports:
      - "10000:10000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: >-
        Host=postgres;Port=5432;Database=processmanager;Username=postgres;Password=${POSTGRES_PASSWORD}
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required — see .env.example}
      Jwt__Issuer: ProcessManager.Api
      Jwt__Audience: ProcessManager
      Jwt__ExpiryMinutes: ${JWT_EXPIRY_MINUTES:-480}
      Swagger__Password: ${SWAGGER_PASSWORD:-}
      SeedAdminPassword: ${SEED_ADMIN_PASSWORD:-Admin1234!}
    depends_on:
      postgres:
        condition: service_healthy

  # ── Web (Blazor Server) ──────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: src/ProcessManager.Web/Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      PORT: 5000
      ApiBaseUrl: http://api:10000
    depends_on:
      - api

volumes:
  pgdata:
